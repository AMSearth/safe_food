{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; color: var(--dark-green);">Medical Profile</h2>
    <p style="text-align: center; margin-bottom: 2rem; color: #666;">Provide health details to get accurate diet plans and food analysis.</p>
    
    <form method="POST">
        <div class="form-group">
            <label>Age (years)</label>
            <input type="number" name="age" class="form-control" value="{{ profile['age'] if profile else '' }}" required>
        </div>
        <div class="form-group">
            <label>Weight (kg)</label>
            <input type="number" step="0.1" name="weight" class="form-control" value="{{ profile['weight'] if profile else '' }}" required>
        </div>
        <div class="form-group">
            <label>Height (cm)</label>
            <input type="number" step="0.1" name="height" class="form-control" value="{{ profile['height'] if profile else '' }}" required>
        </div>
        <div class="form-group">
            <label>Underlying Medical Conditions</label>
            <input type="text" name="conditions" class="form-control" placeholder="E.g. Diabetes, Hypertension, None" value="{{ profile['conditions'] if profile else '' }}" required>
        </div>
        <div class="form-group">
            <label>Allergies</label>
            <input type="text" name="allergies" class="form-control" placeholder="E.g. Peanuts, Dairy, None" value="{{ profile['allergies'] if profile else '' }}" required>
        </div>
        
        <button type="submit" class="btn-primary">Save Profile</button>
    </form>
</div>
{% endblock %}
